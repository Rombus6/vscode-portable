[Launch]
ProgramExecutable=VSCode\code.exe
CommandLineArguments='--locale="%PortableApps.comLanguageCode%"'
DirectoryMoveOK=yes
DisableSplashScreen=true
SplashTime=0
SupportsUNC=yes
MinOS=7

[Activate]
Java=find

[Environment]
PAL:CommonFiles=%PAL:PortableAppsDir%\CommonFiles
PAL:CommonFiles:DoubleBackslash=%PAL:PortableAppsDir:DoubleBackslash%\\CommonFiles
PAL:CommonFiles:Forwardslash=%PAL:PortableAppsDir:Forwardslash%/CommonFiles
PAL:CommonFiles:java.util.prefs=%PAL:PortableAppsDir:java.util.prefs%///Common/Files

GIT=%PAL:CommonFiles%\Git
HOME=%GIT%
GRADLE_HOME=%PAL:CommonFiles%\Gradle
GRADLE_USER_HOME=%GRADLE_HOME%\.gradle
MAVEN_HOME=%PAL:CommonFiles%\Maven
MVN_HOME=%MAVEN_HOME%
M2_HOME=%MAVEN_HOME%
DERBY_HOME=%PAL:CommonFiles%\Derby
JAVA_HOME=%PAL:CommonFiles%\JDK64
NODE=%PAL:CommonFiles%\NodeJS
CMDER_ROOT=%PAL:CommonFiles%\Cmder
PYTHON_HISTORY=%CMDER_ROOT%\config\.python_history
NUGET_PACKAGES=%PAL:CommonFiles%\NuGet\packages
NUGET_HTTP_CACHE_PATH=%PAL:CommonFiles%\NuGet\v3-cache
NUGET_SCRATCH=%PAL:CommonFiles%\NuGet\NuGetScratch
NUGET_PLUGINS_CACHE_PATH=%PAL:CommonFiles%\NuGet\plugins-cache
DOTNET_CLI_TELEMETRY_OPTOUT=true
DOTNET_CLI_HOME=%PAL:CommonFiles%\DotNet
PATH=%PAL:CommonFiles%\Utilities;%DERBY_HOME%;%GRADLE_HOME%\bin;%MAVEN_HOME%\bin;%GIT%\bin;%NODE%;%PATH%
MYSQL=%PAL:CommonFiles:DoubleBackslash%\\MySQL\\
MONGODB=%PAL:CommonFiles%\MongoDB\

[FileWrite1]
Type=ConfigWrite
File=%PAL:AppDir%\VSCode\data\user-data\User\settings.json
Entry='    "php.validate.executablePath": '
Value="%PAL:PortableAppsDir:DoubleBackslash%\\XAMPP\\App\\xampp\\php\\php.exe",

[FileWrite2]
Type=ConfigWrite
File=%PAL:AppDir%\VSCode\data\user-data\User\settings.json
Entry='    "python.defaultInterpreterPath": '
Value="%PAL:CommonFiles:DoubleBackslash%\\WinPY\\scripts\\winpython.bat",

[FileWrite3]
Type=ConfigWrite
File=%PAL:AppDir%\VSCode\data\user-data\User\settings.json
Entry='    "java.jdt.ls.java.home": '
Value="%PAL:CommonFiles:DoubleBackslash%\\OpenJDK64",

[FileWrite4]
Type=ConfigWrite
File=%PAL:AppDir%\VSCode\data\user-data\User\settings.json
Entry='    "rsp-ui.rsp.java.home": '
Value="%PAL:CommonFiles:DoubleBackslash%\\OpenJDK64",

[FileWrite5]
Type=ConfigWrite
File=%PAL:AppDir%\VSCode\data\user-data\User\settings.json
Entry='    "netbeans.jdkhome": '
Value="%PAL:CommonFiles:DoubleBackslash%\\OpenJDK64",

[DirectoriesCleanupIfEmpty]
1=%USERPROFILE%\.vscode\cli
2=%USERPROFILE%\.vscode

[DirectoriesCleanupForce]
1=%APPDATA%\vscode-sqltools
2=%LOCALAPPDATA%\vscode-sqltools
3=%LOCALAPPDATA%\npm-cache
4=%LOCALAPPDATA%\pip
5=%USERPROFILE%\.gfclient
6=%USERPROFILE%\.templateengine
7=%USERPROFILE%\.ms-ad

[DirectoriesMove]
.rsp=%USERPROFILE%\.rsp